name: CI

on:
  push:
  pull_request:

jobs:
  lwc-jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run LWC Jest tests
        run: npm run test:unit
